name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          elixir-version: "1.20"

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      # Dialyzer's PLT is expensive to build; cache it keyed on the toolchain and
      # deps so it only rebuilds when those change.
      - uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-otp29-elixir1.20-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-otp29-elixir1.20-

      - run: mix deps.get
      # Fail if a locked dep has been retired on Hex (security/yanked), so it
      # can't be silently reinstalled or republished against.
      - run: mix hex.audit
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix credo --strict
      - run: mix docs --warnings-as-errors
      # The :live tag (a real, paid claude call) is excluded by default, so CI
      # makes no API calls and needs no claude binary.
      - run: mix test
      - run: mix dialyzer
      # Packaging smoke test: build the Hex tarball (exercises the package/0
      # files: list) so tarball contents are validated in CI, not first at publish.
      - run: mix hex.build
